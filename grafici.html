      <h1>Grafici</h1>
      <p>Qui sotto verranno mostrati i grafici realizzati con Flourish.</p>

      <!--
        COME INSERIRE UN GRAFICO FLOURISH
        =============================================
        1) Apri il tuo grafico su flourish.studio
        2) Clicca su "Share" > "Embed code"
        3) Copia lo snippet, che avrà questa forma:

           <div class="flourish-embed flourish-chart" data-src="visualisation/NUMERO">
             <script src="https://public.flourish.studio/resources/embed.js"></script>
           </div>

        4) Incollalo al posto (o accanto) del blocco "grafico-placeholder" qui sotto.
        5) Puoi aggiungere più grafici semplicemente ripetendo il blocco div,
           uno per ogni visualizzazione (basta un solo <script> embed.js in tutta la pagina).
      -->

      <div class="grafico-placeholder">
        <p>📊 Grafico Flourish #1 in arrivo</p>
      </div>

      <div class="grafico-placeholder">
        <p>📊 Grafico Flourish #2 in arrivo</p>
      </div>

    </section>
